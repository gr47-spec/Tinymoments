<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Tiny Moments</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
padding:40px;
}

h1{
margin-bottom:20px;
}

input{
padding:10px;
width:260px;
border-radius:6px;
border:none;
}

button{
padding:10px;
margin-left:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

.post{
background:#1e1e1e;
padding:12px;
margin:10px auto;
width:300px;
border-radius:10px;
}

.actions{
margin-top:8px;
font-size:14px;
}

.actions span{
margin-right:10px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Tiny Moments</h1>

<input id="postInput" placeholder="Write something">
<button id="postBtn">Post</button>

<div id="posts"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
doc,
updateDoc,
deleteDoc,
increment,
query,
orderBy
}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyAeTxavZ6z0LmvCfO8Uo768QU2QeJ4FbOw",
  authDomain: "tiny-moments-52fc9.firebaseapp.com",
  projectId: "tiny-moments-52fc9",
  storageBucket: "tiny-moments-52fc9.firebasestorage.app",
  messagingSenderId: "23616553927",
  appId: "1:23616553927:web:4731ae0a51b84058d68fe2"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


const input = document.getElementById("postInput");
const btn = document.getElementById("postBtn");
const postsDiv = document.getElementById("posts");


btn.onclick = async () => {

const text = input.value;

if(!text) return;

await addDoc(collection(db,"posts"),{
text:text,
likes:0,
time:Date.now()
});

input.value="";

};


const q = query(collection(db,"posts"), orderBy("time","desc"));

onSnapshot(q,(snapshot)=>{

postsDiv.innerHTML="";

snapshot.forEach((docSnap)=>{

const data = docSnap.data();
const id = docSnap.id;

const div=document.createElement("div");
div.className="post";

div.innerHTML = `
<div>${data.text}</div>

<div class="actions">

<span onclick="likePost('${id}')">❤️ ${data.likes || 0}</span>

<span onclick="deletePost('${id}')">🗑 delete</span>

</div>
`;

postsDiv.appendChild(div);

});

});


window.likePost = async (id)=>{

const ref = doc(db,"posts",id);

await updateDoc(ref,{
likes: increment(1)
});

};


window.deletePost = async (id)=>{

const ref = doc(db,"posts",id);

await deleteDoc(ref);

};

</script>

</body>
</html>
